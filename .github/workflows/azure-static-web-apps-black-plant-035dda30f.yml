name: Cloud Resume — Full Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Deploy frontend + function to Azure ───────────────────
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_PLANT_035DDA30F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          api_location: "api"
          output_location: ""

  # ── Verify live site after deploy ─────────────────────────
  verify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check visitor counter endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://visitor-counter-g3a7htaze9cfdbga.canadacentral-01.azurewebsites.net/api/GetVisitorCount")
          echo "Function returned status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Visitor counter is not returning 200!"
            exit 1
          fi
